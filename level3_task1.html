<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery & Slideshow</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
         :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --border: #2a2a2a;
            --accent: #e8c97a;
            --accent2: #c97a8e;
            --text: #f0ece4;
            --muted: #888;
            --radius: 12px;
        }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            padding: 40px 24px 80px;
        }
        /* ── Header ── */
        
        header {
            text-align: center;
            margin-bottom: 60px;
        }
        
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        header p {
            color: var(--muted);
            font-size: 0.95rem;
            margin-top: 8px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        /* ══════════════════════════════════════════
       SECTION 1 — THUMBNAIL GALLERY
    ══════════════════════════════════════════ */
        
        .section-label {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 80px;
        }
        
        .thumb {
            position: relative;
            aspect-ratio: 1;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            background: var(--surface);
            border: 1px solid var(--border);
            transition: transform 0.3s cubic-bezier(.23, 1, .32, 1), box-shadow 0.3s;
        }
        
        .thumb:hover {
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 0 1px var(--accent);
        }
        
        .thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.4s;
            display: block;
        }
        
        .thumb:hover img {
            filter: brightness(1.1) saturate(1.15);
        }
        
        .thumb-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: flex-end;
            padding: 14px;
        }
        
        .thumb:hover .thumb-overlay {
            opacity: 1;
        }
        
        .thumb-overlay span {
            font-size: 0.8rem;
            color: var(--accent);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        
        .thumb-zoom-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 44px;
            height: 44px;
            background: rgba(232, 201, 122, 0.15);
            border: 1.5px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s cubic-bezier(.23, 1, .32, 1), opacity 0.3s;
            opacity: 0;
        }
        
        .thumb:hover .thumb-zoom-icon {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        
        .thumb-zoom-icon svg {
            width: 18px;
            height: 18px;
            stroke: var(--accent);
        }
        /* ── Lightbox ── */
        
        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(18px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }
        
        .lightbox.open {
            opacity: 1;
            pointer-events: all;
        }
        
        .lightbox-inner {
            position: relative;
            max-width: 90vw;
            max-height: 85vh;
            transform: scale(0.88) translateY(20px);
            transition: transform 0.45s cubic-bezier(.23, 1, .32, 1);
        }
        
        .lightbox.open .lightbox-inner {
            transform: scale(1) translateY(0);
        }
        
        .lightbox-inner img {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: var(--radius);
            display: block;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
        }
        
        .lightbox-caption {
            text-align: center;
            margin-top: 14px;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        
        .lightbox-close {
            position: fixed;
            top: 24px;
            right: 28px;
            background: none;
            border: 1.5px solid var(--border);
            color: var(--text);
            font-size: 1.3rem;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, background 0.2s;
        }
        
        .lightbox-close:hover {
            border-color: var(--accent);
            background: rgba(232, 201, 122, 0.1);
        }
        
        .lightbox-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(22, 22, 22, 0.8);
            border: 1.5px solid var(--border);
            color: var(--text);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, background 0.2s;
            backdrop-filter: blur(8px);
        }
        
        .lightbox-nav:hover {
            border-color: var(--accent);
            background: rgba(232, 201, 122, 0.12);
        }
        
        #lb-prev {
            left: 20px;
        }
        
        #lb-next {
            right: 20px;
        }
        /* ══════════════════════════════════════════
       SECTION 2 — AUTO SLIDESHOW
    ══════════════════════════════════════════ */
        
        .slideshow-wrap {
            max-width: 860px;
            margin: 0 auto;
        }
        
        .slideshow {
            position: relative;
            aspect-ratio: 16/9;
            border-radius: 18px;
            overflow: hidden;
            background: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
        }
        
        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.9s ease;
            pointer-events: none;
        }
        
        .slide.active {
            opacity: 1;
            pointer-events: all;
        }
        
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* Ken Burns on active slide */
        
        .slide.active img {
            animation: kenburns 6s ease-in-out infinite alternate;
        }
        
        @keyframes kenburns {
            from {
                transform: scale(1) translate(0, 0);
            }
            to {
                transform: scale(1.08) translate(-1%, -1%);
            }
        }
        
        .slide-text {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 32px 32px 28px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
        }
        
        .slide-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--text);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }
        
        .slide-sub {
            font-size: 0.8rem;
            color: rgba(240, 236, 228, 0.6);
            margin-top: 4px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        /* Progress bar */
        
        .slide-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: var(--accent);
            border-radius: 0;
            transform-origin: left;
            animation: none;
        }
        
        .slide.active .slide-progress {
            animation: progress-bar 4s linear forwards;
        }
        
        @keyframes progress-bar {
            from {
                width: 0%;
            }
            to {
                width: 100%;
            }
        }
        /* Dots */
        
        .slide-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
            border: none;
        }
        
        .dot.active {
            background: var(--accent);
            transform: scale(1.3);
        }
        /* Slideshow controls */
        
        .ss-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }
        
        .ss-btn {
            background: var(--surface);
            border: 1.5px solid var(--border);
            color: var(--text);
            padding: 8px 20px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 0.82rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, background 0.2s;
        }
        
        .ss-btn:hover,
        .ss-btn.active-btn {
            border-color: var(--accent);
            background: rgba(232, 201, 122, 0.1);
            color: var(--accent);
        }
        /* Divider */
        
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
            margin: 60px 0;
        }
    </style>
</head>

<body>

    <header>
        <h1>Image Gallery &amp; Slideshow</h1>
        <p>Level 3 · Task 1 · Image Manipulation</p>
    </header>

    <!-- ── GALLERY ── -->
    <div class="section-label">Thumbnail Gallery</div>
    <div class="gallery" id="gallery"></div>

    <div class="divider"></div>

    <!-- ── SLIDESHOW ── -->
    <div class="section-label">Auto Slideshow</div>
    <div class="slideshow-wrap">
        <div class="slideshow" id="slideshow"></div>
        <div class="slide-dots" id="dots"></div>
        <div class="ss-controls">
            <button class="ss-btn" id="ss-prev">← Prev</button>
            <button class="ss-btn active-btn" id="ss-pause">⏸ Pause</button>
            <button class="ss-btn" id="ss-next">Next →</button>
        </div>
    </div>

    <!-- ── LIGHTBOX ── -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lb-close">✕</button>
        <button class="lightbox-nav" id="lb-prev">‹</button>
        <button class="lightbox-nav" id="lb-next">›</button>
        <div class="lightbox-inner">
            <img src="" alt="" id="lb-img" />
            <div class="lightbox-caption" id="lb-cap"></div>
        </div>
    </div>

    <script>
        /* ── Data: using picsum for placeholder images ── */
        const images = [{
            src: 'https://picsum.photos/seed/arch1/800/800',
            title: 'Urban Architecture',
            idx: 0
        }, {
            src: 'https://picsum.photos/seed/nature2/800/800',
            title: 'Mountain Forest',
            idx: 1
        }, {
            src: 'https://picsum.photos/seed/ocean3/800/800',
            title: 'Coastal Horizon',
            idx: 2
        }, {
            src: 'https://picsum.photos/seed/city4/800/800',
            title: 'City Lights',
            idx: 3
        }, {
            src: 'https://picsum.photos/seed/desert5/800/800',
            title: 'Golden Dunes',
            idx: 4
        }, {
            src: 'https://picsum.photos/seed/forest6/800/800',
            title: 'Ancient Woodland',
            idx: 5
        }, {
            src: 'https://picsum.photos/seed/lake7/800/800',
            title: 'Still Waters',
            idx: 6
        }, {
            src: 'https://picsum.photos/seed/peak8/800/800',
            title: 'Alpine Summit',
            idx: 7
        }, ];

        const slideshowData = [{
            src: 'https://picsum.photos/seed/slide1/1280/720',
            title: 'Urban Architecture',
            sub: 'Series I'
        }, {
            src: 'https://picsum.photos/seed/slide2/1280/720',
            title: 'Mountain Forest',
            sub: 'Series II'
        }, {
            src: 'https://picsum.photos/seed/slide3/1280/720',
            title: 'Coastal Horizon',
            sub: 'Series III'
        }, {
            src: 'https://picsum.photos/seed/slide4/1280/720',
            title: 'City Lights',
            sub: 'Series IV'
        }, {
            src: 'https://picsum.photos/seed/slide5/1280/720',
            title: 'Golden Dunes',
            sub: 'Series V'
        }, ];

        /* ═══════════════ GALLERY ═══════════════ */
        const gallery = document.getElementById('gallery');
        images.forEach((img, i) => {
            const div = document.createElement('div');
            div.className = 'thumb';
            div.innerHTML = `
      <img src="${img.src}" alt="${img.title}" loading="lazy"/>
      <div class="thumb-overlay"><span>${img.title}</span></div>
      <div class="thumb-zoom-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>`;
            div.addEventListener('click', () => openLightbox(i));
            gallery.appendChild(div);
        });

        /* ═══════════════ LIGHTBOX ═══════════════ */
        let lbIndex = 0;
        const lightbox = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbCap = document.getElementById('lb-cap');

        function openLightbox(i) {
            lbIndex = i;
            updateLightbox();
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('open');
            document.body.style.overflow = '';
        }

        function updateLightbox() {
            const img = images[lbIndex];
            lbImg.src = img.src;
            lbImg.alt = img.title;
            lbCap.textContent = `${img.title}  ·  ${lbIndex + 1} / ${images.length}`;
        }

        document.getElementById('lb-close').addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', e => {
            if (e.target === lightbox) closeLightbox();
        });
        document.getElementById('lb-prev').addEventListener('click', () => {
            lbIndex = (lbIndex - 1 + images.length) % images.length;
            updateLightbox();
        });
        document.getElementById('lb-next').addEventListener('click', () => {
            lbIndex = (lbIndex + 1) % images.length;
            updateLightbox();
        });
        document.addEventListener('keydown', e => {
            if (!lightbox.classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') {
                lbIndex = (lbIndex - 1 + images.length) % images.length;
                updateLightbox();
            }
            if (e.key === 'ArrowRight') {
                lbIndex = (lbIndex + 1) % images.length;
                updateLightbox();
            }
        });

        /* ═══════════════ SLIDESHOW ═══════════════ */
        const ssEl = document.getElementById('slideshow');
        const dotsEl = document.getElementById('dots');
        let ssIndex = 0;
        let ssTimer = null;
        let isPaused = false;

        // Build slides
        slideshowData.forEach((s, i) => {
            const slide = document.createElement('div');
            slide.className = 'slide' + (i === 0 ? ' active' : '');
            slide.innerHTML = `
      <img src="${s.src}" alt="${s.title}" loading="${i === 0 ? 'eager' : 'lazy'}"/>
      <div class="slide-text">
        <div class="slide-title">${s.title}</div>
        <div class="slide-sub">${s.sub}</div>
      </div>
      <div class="slide-progress"></div>`;
            ssEl.appendChild(slide);

            const dot = document.createElement('button');
            dot.className = 'dot' + (i === 0 ? ' active' : '');
            dot.addEventListener('click', () => goToSlide(i));
            dotsEl.appendChild(dot);
        });

        const slides = ssEl.querySelectorAll('.slide');
        const dots = dotsEl.querySelectorAll('.dot');

        function goToSlide(n) {
            slides[ssIndex].classList.remove('active');
            dots[ssIndex].classList.remove('active');
            ssIndex = (n + slideshowData.length) % slideshowData.length;
            slides[ssIndex].classList.add('active');
            dots[ssIndex].classList.add('active');

            // Restart progress bar by forcing reflow
            const bar = slides[ssIndex].querySelector('.slide-progress');
            bar.style.animation = 'none';
            bar.offsetWidth; // reflow
            bar.style.animation = '';
        }

        function nextSlide() {
            goToSlide(ssIndex + 1);
        }

        function startTimer() {
            ssTimer = setInterval(nextSlide, 4000);
        }

        function stopTimer() {
            clearInterval(ssTimer);
        }

        startTimer();

        document.getElementById('ss-prev').addEventListener('click', () => {
            stopTimer();
            goToSlide(ssIndex - 1);
            if (!isPaused) startTimer();
        });
        document.getElementById('ss-next').addEventListener('click', () => {
            stopTimer();
            goToSlide(ssIndex + 1);
            if (!isPaused) startTimer();
        });
        const pauseBtn = document.getElementById('ss-pause');
        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            if (isPaused) {
                stopTimer();
                pauseBtn.textContent = '▶ Play';
            } else {
                startTimer();
                pauseBtn.textContent = '⏸ Pause';
            }
        });
    </script>
</body>

</html>
